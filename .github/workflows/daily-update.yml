name: Daily Data Update

on:
  schedule:
    # 매일 16:00 KST = 07:00 UTC (장 마감 후 30분 여유)
    - cron: "0 7 * * 1-5"   # 평일만
  workflow_dispatch:        # 수동 실행 가능

permissions:
  contents: write           # Release 생성/업데이트 권한

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r backend/requirements.txt

      - name: Restore last data (이전 Release에서)
        # 이전에 생성한 Release가 있으면 다운로드해서 incremental 갱신 base로 사용
        run: |
          mkdir -p data/ohlcv data/signals
          set +e
          gh release download data-latest --pattern "stocks.db" --dir data/ 2>/dev/null || echo "No previous DB"
          gh release download data-latest --pattern "all_signals.csv" --dir data/signals/ 2>/dev/null || echo "No previous signals"
          gh release download data-latest --pattern "tickers_filtered.csv" --dir data/ 2>/dev/null || echo "No previous tickers"
          set -e
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run daily update
        run: python scripts/daily_update.py
        timeout-minutes: 50

      - name: Show summary
        run: |
          echo "=== Outputs ==="
          ls -lh data/stocks.db data/signals/all_signals.csv data/tickers_filtered.csv 2>&1 || true

      - name: Update Release 'data-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: data-latest
          name: "Daily data — auto"
          body: |
            매일 자동 갱신되는 stocks.db / all_signals.csv / tickers_filtered.csv.
            Last update: ${{ github.run_started_at }}
          files: |
            data/stocks.db
            data/signals/all_signals.csv
            data/tickers_filtered.csv
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger Railway redeploy (if RAILWAY_DEPLOY_HOOK is set)
        if: env.RAILWAY_DEPLOY_HOOK != ''
        env:
          RAILWAY_DEPLOY_HOOK: ${{ secrets.RAILWAY_DEPLOY_HOOK }}
        run: |
          curl -fsS -X POST "$RAILWAY_DEPLOY_HOOK" || echo "deploy hook failed (non-fatal)"
